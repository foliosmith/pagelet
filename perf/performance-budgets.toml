schema_version = 1

[runner_fingerprint]
id = "local-generated-fixture-smoke"
description = "Local generated fixture smoke runner; not a hard pinned performance gate."
os = "any"
arch = "any"
rust_toolchain = "stable"
fixture_source = "tools/pagelet-testkit generated EPUB fixtures"
cache_policy = "warm process, generated inputs, no external corpus"

[[budgets]]
case = "fixture_generation/minimal-epub3"
runner = "local-generated-fixture-smoke"
absolute_p95_ms = 50
relative_regression_pct = 25
minimum_effect_ms = 5
policy = "warn"

