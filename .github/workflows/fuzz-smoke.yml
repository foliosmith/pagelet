name: Fuzz Smoke

on:
  pull_request:
    paths:
      - ".github/workflows/fuzz-smoke.yml"
      - "crates/pagelet/**"
      - "fuzz/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  smoke:
    name: Parser and layout smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build fuzz-adjacent modules
        run: cargo test -p pagelet --all-features
